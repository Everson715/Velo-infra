worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Captura o X-Correlation-ID enviado pelo client, se nao, gera um novo (request_id)
    map $http_x_correlation_id $correlation_id {
        default $http_x_correlation_id;
        ""      $request_id;
    }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    'correlation_id="$correlation_id" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream_addr="$upstream_addr" upstream_status="$upstream_status" '
                    'upstream_response_time="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log debug;

    sendfile        on;
    keepalive_timeout  65;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream identity_driver {
        server identity-driver:8000;
    }

    upstream payment_finance {
        server payment-finance-service:8080;
    }

    upstream review_rating {
        server review-rating-service:3000;
    }

    upstream tracking_telemetry {
        server tracking-telemetry-service:3003;
    }

    upstream trip_matching {
        server trip-matching:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # Propaga o header X-Correlation-ID
        proxy_set_header X-Correlation-ID $correlation_id;
        
        # Headers essenciais comuns
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 1. Identity & Driver Service
        location ~ ^/api/v1/(auth|users|drivers)(/.*)?$ {
            proxy_pass http://identity_driver;
        }

        # 2. Payment & Finance Service
        location ~ ^/api/v1/(payments|wallets|transactions)(/.*)?$ {
            proxy_pass http://payment_finance;
        }

        # 3. Review & Rating Service
        location ~ ^/api/v1/(reviews|ratings|reports)(/.*)?$ {
            proxy_pass http://review_rating;
        }

        # 4. Tracking & Telemetry Service (WebSockets & Long-polling)
        location ~ ^/api/v1/(telemetry|tracking)(/.*)?$ {
            proxy_pass http://tracking_telemetry;
            
            # WebSocket Support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Ajustes de timeout recomendados para telemetria/websockets (10 minutos)
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # 5. Trip Matching Service
        location ~ ^/api/v1/(trips|matches|pricing)(/.*)?$ {
            proxy_pass http://trip_matching;
        }

        # Default fallback (404)
        location / {
            return 404 '{"error": "Not Found", "message": "The requested endpoint does not exist on the API Gateway"}';
            add_header Content-Type application/json;
        }
    }
}