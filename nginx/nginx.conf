worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    'correlation_id="$request_id" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream_addr="$upstream_addr" upstream_status="$upstream_status" '
                    'upstream_response_time="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log debug;

    sendfile        on;
    keepalive_timeout  65;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Mantemos APENAS os serviços que estão rodando no seu docker-compose
    upstream identity_driver {
        server identity-driver:8000;
    }

    upstream trip_matching {
        server trip-matching:3000;
    }

    upstream tracking-telemetry {
        server tracking-telemetry-service:3000;
    }

    upstream payment_finance{
        server payment-finance-service:8080;
    }
    
    upstream review_rating {
        server review-rating-service:3000;
    }

    server {
        listen 80;
        server_name localhost;

        proxy_set_header X-Correlation-ID $request_id;

        # Identity Driver Service
        location ~ ^/api/v1/(auth|users|me)(/.*)?$ {
            proxy_pass http://identity_driver;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Trip Matching Service
        location ~ ^/api/v1/(routes|estimates|pricing|match)(/.*)?$ {
            proxy_pass http://trip_matching;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Configuração para o serviço de telemetria (WebSockets + Fastify)
        location /tracking/ {
            # Direciona para o nome do serviço definido no docker-compose e a porta interna dele
            proxy_pass http://tracking-telemetry/; 

            # Suporte nativo a WebSockets e HTTP/1.1
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";

            # Headers essenciais para o Fastify identificar a origem real das requisições
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Ajustes de timeout recomendados para conexões persistentes (WebSockets)
            # Evita que o Nginx feche a conexão se o cliente passar 10 minutos sem enviar dados
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }
        # Payment Finance Service (Spring Boot)
        location ~ ^/api/v1/(payments)(/.*)?$ {
            proxy_pass http://payment_finance;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        # Review Rating Service(NestJS)
        location ~ ^/api/v1/(review|rating)(/.*)?$ {
            proxy_pass http://review_rating;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        

        # Default fallback para qualquer outra rota (Evita bater nos serviços desligados)
        location / {
            return 404 '{"error": "Not Found", "message": "The requested endpoint does not exist or the microservice is offline"}';
            add_header Content-Type application/json;
        }
    }
}