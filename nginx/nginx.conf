worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream_addr="$upstream_addr" upstream_status="$upstream_status" '
                    'upstream_response_time="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log debug;

    sendfile        on;
    keepalive_timeout  65;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream identity_driver {
        server identity-driver:8000;
    }

    upstream trip_matching {
        server trip-matching:3000;
    }

    upstream tracking_telemetry {
        server tracking-telemetry:3001;
    }

    upstream review_rating {
        server review-rating:3002;
    }

    upstream payment_finance {
        server payment-finance:8080;
    }

    server {
        listen 80;
        server_name localhost;

        # Identity Driver Service
        location ~ ^/api/v1/(auth|users|me)(/.*)?$ {
            proxy_pass http://identity_driver;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Trip Matching Service
        location ~ ^/api/v1/(routes|estimates|pricing|match)(/.*)?$ {
            proxy_pass http://trip_matching;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Tracking Telemetry Service (with WebSocket support)
        location ~ ^/api/v1/tracking(/.*)?$ {
            proxy_pass http://tracking_telemetry;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400; # Keep WS connections alive
            proxy_send_timeout 86400;
        }

        # Payment Finance Service
        location ~ ^/api/v1/payments(/.*)?$ {
            proxy_pass http://payment_finance;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Review Rating Service
        location ~ ^/api/v1/reviews(/.*)?$ {
            proxy_pass http://review_rating;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Default fallback
        location / {
            return 404 '{"error": "Not Found", "message": "The requested endpoint does not exist on Velo API Gateway"}';
            add_header Content-Type application/json;
        }
    }
}
