version: '3.8' # Remova se o Docker acusar o warning de obsoleto

services:
  velo-postgres:
    image: postgres:16-alpine
    container_name: velo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: velo_trips
    ports:
      - "5432:5432"
    networks:
      - velo-network

  trip-matching:
    build:
      context: ../Velo-trip-matching-service
      dockerfile: Dockerfile
    container_name: velo-trip-matching
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@velo-postgres:5432/velo_trips?schema=public
    depends_on:
      - velo-postgres
    networks:
      - velo-network

  nginx-gateway:
    image: nginx:1.25-alpine
    container_name: velo-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - trip-matching
    networks:
      - velo-network

networks:
  velo-network:
    driver: bridge