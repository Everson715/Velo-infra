      - velo-identity-db-data:/var/lib/postgresql/data
>>>>>>> b4d5f60cdfd260dce08799b832f2ebcfc7ab2795
    networks:
      - velo-network

  # 2. Banco do Trip Matching
  velo-postgres-trips:
    image: postgres:15-alpine
    container_name: velo-postgres-trips
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=velo_trips
    volumes:
      - velo-trips-db-data:/var/lib/postgresql/data
    networks:
      - velo-network

  # 3. Banco do Payment Finance
  velo-postgres-payments:
    image: postgres:15-alpine
    container_name: velo-postgres-payments
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=velo_payments
    volumes:
      - velo-payments-db-data:/var/lib/postgresql/data
    networks:
      - velo-network

  # 4. Banco do Review Rating
  velo-postgres-reviews:
    image: postgres:15-alpine
    container_name: velo-postgres-reviews
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=velo_reviews
    volumes:
      - velo-reviews-db-data:/var/lib/postgresql/data
    networks:
      - velo-network

  # 5. Cache/Persistência do Tracking Telemetry (Redis Dedicado)
  velo-redis-telemetry:
    image: redis:7-alpine
    container_name: velo-redis-telemetry
    ports:
      - "6379:6379"
    volumes:
      - velo-telemetry-cache-data:/data
    networks:
      - velo-network

  # ==========================================
  # MICROSSERVIÇOS DA APLICAÇÃO
  # ==========================================

  # Trip Matching Service
  trip-matching:
    build:
      context: ../Velo-trip-matching-service
      dockerfile: Dockerfile
    container_name: velo-trip-matching
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@velo-postgres-trips:5432/velo_trips?schema=public
      - PAYMENT_SERVICE_URL=http://payment-finance-service:8080/api/v1/payments/capture
    depends_on:
      - velo-postgres-trips
    networks:
      - velo-network

  # Identity Driver Service
  identity-driver:
    build:
      context: ../Velo-identity-driver-service 
      dockerfile: Dockerfile
    container_name: velo-php-identity
    ports:
      - "8001:8000"
    environment:
      - DB_HOST=velo-postgres-identity
      - DB_PORT=5432
      - DB_DATABASE=velo_identity
      - DB_USERNAME=postgres
      - DB_PASSWORD=password

    command: php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
      - velo-postgres-identity
    networks:
      - velo-network 

  # Telemetry Service (Mock)
  tracking-telemetry-service:
    image: node:20-alpine
    container_name: velo-tracking-telemetry
    command: node -e "const http = require('http'); http.createServer((req, res) => res.end('Telemetry Mock Running')).listen(3000);"
    environment:
      - REDIS_HOST=velo-redis-telemetry
      - REDIS_PORT=6379
    depends_on:
      - velo-redis-telemetry
    networks:
      - velo-network
    
  # Payment Finance Service (Mock)
  payment-finance-service:
    image: alpine:latest
    container_name: velo-payment-finance
    command: >
      sh -c "while true; do echo -e 'HTTP/1.1 200 OK\nContent-Type: application/json\n\n{\"status\":\"Payment Mock Running\"}' | nc -l -p 8080; done"
    environment:
      - DB_HOST=velo-postgres-payments
      - DB_PORT=5432
      - DB_DATABASE=velo_payments
    depends_on:
      - velo-postgres-payments
    networks:
      - velo-network

  # Review Rating Service (Mock)
  review-rating-service:
    image: node:20-alpine
    container_name: velo-review-rating
    command: node -e "const http = require('http'); http.createServer((req, res) => res.end('Review Mock Running')).listen(3000);"
    environment:
      - DB_HOST=velo-postgres-reviews
      - DB_PORT=5432
      - DB_DATABASE=velo_reviews
    depends_on:
      - velo-postgres-reviews
    networks:
      - velo-network

  # Gateway Nginx
  nginx-gateway:
    image: nginx:1.25-alpine
    container_name: velo-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - trip-matching
      - identity-driver
      - tracking-telemetry-service
      - payment-finance-service
      - review-rating-service
    networks:
      - velo-network

volumes:
  velo-identity-db-data:
  velo-trips-db-data:
  velo-payments-db-data:
  velo-reviews-db-data:
  velo-telemetry-cache-data:

networks:
  velo-network:
    driver: bridge