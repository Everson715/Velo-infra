version: '3.8'

services:
  nginx-gateway:
    image: nginx:1.25-alpine
    container_name: velo-nginx-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - identity-driver
      - trip-matching
      - tracking-telemetry
      - review-rating
      - payment-finance
    networks:
      - velo-network

  postgres:
    image: postgres:16-alpine
    container_name: velo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - velo-network

  identity-driver:
    build:
      context: ../Velo-identity-driver-service
    container_name: velo-identity-driver
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: velo_identity
      DB_USERNAME: postgres
      DB_PASSWORD: password
    depends_on:
      - postgres
    networks:
      - velo-network

  trip-matching:
    build:
      context: ../Velo-trip-matching-service
    container_name: velo-trip-matching
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: velo_trips
      DB_USERNAME: postgres
      DB_PASSWORD: password
    depends_on:
      - postgres
    networks:
      - velo-network

  tracking-telemetry:
    build:
      context: ../Velo-tracking-telemetry-service
    container_name: velo-tracking-telemetry
    ports:
      - "3001:3001"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: velo_tracking
      DB_USERNAME: postgres
      DB_PASSWORD: password
    depends_on:
      - postgres
    networks:
      - velo-network

  review-rating:
    build:
      context: ../Velo-review-rating-service
    container_name: velo-review-rating
    ports:
      - "3002:3002"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: velo_reviews
      DB_USERNAME: postgres
      DB_PASSWORD: password
    depends_on:
      - postgres
    networks:
      - velo-network

  payment-finance:
    build:
      context: ../Velo-payment-finance-service
    container_name: velo-payment-finance
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/velo_payments
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
    depends_on:
      - postgres
    networks:
      - velo-network

volumes:
  postgres-data:

networks:
  velo-network:
    driver: bridge