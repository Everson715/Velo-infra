version: '3.8'

services:
  # 1. Banco do Identity Driver
  velo-postgres-identity:
    image: postgres:15-alpine
    container_name: velo-postgres-identity
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=velo_identity
    volumes:
<<<<<<< HEAD
